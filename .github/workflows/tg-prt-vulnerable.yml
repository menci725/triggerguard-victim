name: TG PRT Vulnerable

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: write

jobs:
  pr-target:
    runs-on: ubuntu-latest
    env:
      TRIGGERGUARD_MODE: observe
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout attacker pull request code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install dependencies from pull request
        run: npm install

      - name: Print local marker
        run: |
          if [ -f triggerguard-prt-marker.txt ]; then
            cat triggerguard-prt-marker.txt
          else
            echo "marker missing"
            exit 1
          fi
